<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>솜이 워크스페이스</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Gaegu:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #fff5f9;
    --bg-2: #fde7f1;
    --bg-3: #ffd6e7;
    --surface: #ffffff;
    --text: #1f0f1a;
    --text-2: #6b3a55;
    --text-3: #a07585;
    --border: #f4d8e4;
    --accent: #db2777;
    --accent-2: #ec4899;
    --accent-soft: #fce7f3;
    --shadow-sm: 0 1px 2px rgba(31, 15, 26, 0.04), 0 1px 3px rgba(219, 39, 119, 0.06);
    --shadow-md: 0 6px 24px -4px rgba(219, 39, 119, 0.18), 0 2px 8px rgba(31, 15, 26, 0.05);
    --shadow-lg: 0 24px 64px -16px rgba(219, 39, 119, 0.32), 0 8px 24px rgba(31, 15, 26, 0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    color: var(--text);
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 18% 12%, rgba(236, 72, 153, 0.18) 0%, transparent 50%),
      radial-gradient(ellipse at 82% 88%, rgba(219, 39, 119, 0.15) 0%, transparent 55%),
      linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 60%, var(--bg-3) 100%);
    -webkit-font-smoothing: antialiased;
  }
  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 80px 24px 64px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    text-align: center;
    margin-bottom: 56px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  h1 {
    font-family: 'Gaegu', 'Inter', sans-serif;
    font-size: 56px;
    line-height: 1.1;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent-2) 0%, var(--accent) 60%, #a21caf 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 14px;
  }
  .sub {
    color: var(--text-2);
    font-size: 15px;
    max-width: 540px;
    margin: 0 auto;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    flex: 1;
  }
  a.card {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 28px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    text-decoration: none;
    color: inherit;
    box-shadow: var(--shadow-sm);
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    position: relative;
    overflow: hidden;
  }
  a.card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(236, 72, 153, 0.06) 100%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s ease;
  }
  a.card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
    border-color: var(--accent-2);
  }
  a.card:hover::before { opacity: 1; }
  .icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent-2), var(--accent));
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 6px 16px rgba(219, 39, 119, 0.32);
  }
  .card h2 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .card p {
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.55;
  }
  .card .arrow {
    margin-top: auto;
    align-self: flex-start;
    color: var(--accent);
    font-size: 13px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding-top: 4px;
  }
  footer {
    margin-top: 64px;
    text-align: center;
    color: var(--text-3);
    font-size: 12px;
  }
  @media (max-width: 600px) {
    main { padding: 56px 18px 40px; }
    h1 { font-size: 44px; }
    header { margin-bottom: 36px; }
  }
</style>
</head>
<body>
<main>
  <header>
    <span class="badge">💕 솜이 워크스페이스</span>
    <h1>안녕, 솜이의 도구함이야</h1>
    <p class="sub">필요한 도구 골라서 들어가. 다 같은 자리에 살아.</p>
  </header>
  <div class="grid">
    <a class="card" href="./wms/">
      <div class="icon">📦</div>
      <h2>WMS · 솜이 창고</h2>
      <p>입고·출고·재고·전표 관리. 상품 카탈로그 · Firestore 실시간 동기화.</p>
      <span class="arrow">열기 →</span>
    </a>
    <a class="card" href="./realty/">
      <div class="icon">🏢</div>
      <h2>부동산 모니터링</h2>
      <p>서울 아파트 실거래(매매·전세). 자치구 · 가격 · 면적 등으로 필터링.</p>
      <span class="arrow">열기 →</span>
    </a>
    <a class="card" href="./calc/">
      <div class="icon">🧮</div>
      <h2>계산기</h2>
      <p>가벼운 일반 계산기. 빠르게 한 번 두드릴 때.</p>
      <span class="arrow">열기 →</span>
    </a>
  </div>
  <footer>made with 💕 · sombranch</footer>
</main>
</body>
</html>
