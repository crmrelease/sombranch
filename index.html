<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bunny Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', system-ui, sans-serif;
    color: #f4f4f6;
    background:
      radial-gradient(circle at 20% 20%, #831843 0%, transparent 45%),
      radial-gradient(circle at 80% 80%, #4c1d95 0%, transparent 45%),
      linear-gradient(135deg, #0f0f1e, #1a1a2e);
    background-attachment: fixed;
    padding: 40px 20px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #fbcfe8, #c4b5fd);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 32px;
    letter-spacing: 0.02em;
  }

  .stage {
    position: relative;
    width: min(820px, 100%);
    aspect-ratio: 4 / 3;
    border-radius: 28px;
    overflow: hidden;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow:
      0 30px 80px -20px rgba(0,0,0,0.5),
      0 0 0 1px rgba(255,255,255,0.02) inset;
    backdrop-filter: blur(20px);
  }

  .slides {
    position: absolute;
    inset: 0;
  }

  .slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0;
    transform: scale(1.05);
    transition: opacity 600ms ease, transform 800ms ease;
    pointer-events: none;
  }

  .slide.active {
    opacity: 1;
    transform: scale(1);
  }

  .slide.loading::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.04) 50%, transparent 70%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .gradient-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.4) 100%);
    pointer-events: none;
  }

  .nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: rgba(15,15,30,0.55);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    transition: all 200ms ease;
    z-index: 5;
  }

  .nav:hover {
    background: rgba(139,92,246,0.45);
    border-color: rgba(255,255,255,0.25);
    transform: translateY(-50%) scale(1.08);
  }

  .nav:active {
    transform: translateY(-50%) scale(0.95);
  }

  .nav.prev { left: 16px; }
  .nav.next { right: 16px; }

  .counter {
    position: absolute;
    top: 16px;
    right: 20px;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    background: rgba(15,15,30,0.55);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 6px 12px;
    border-radius: 999px;
    z-index: 5;
    letter-spacing: 0.05em;
  }

  .dots {
    display: flex;
    gap: 8px;
    margin-top: 24px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    border: none;
    cursor: pointer;
    padding: 0;
    transition: all 250ms ease;
  }

  .dot.active {
    width: 28px;
    border-radius: 999px;
    background: linear-gradient(90deg, #ec4899, #a855f7);
  }

  .dot:hover:not(.active) {
    background: rgba(255,255,255,0.4);
  }

  .hint {
    margin-top: 18px;
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.05em;
  }

  kbd {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    font-family: ui-monospace, monospace;
    color: rgba(255,255,255,0.7);
  }

  @media (max-width: 600px) {
    h1 { font-size: 22px; }
    .nav { width: 44px; height: 44px; font-size: 18px; }
    .nav.prev { left: 10px; }
    .nav.next { right: 10px; }
  }
</style>
</head>
<body>
  <h1>🐰 Bunny Gallery</h1>
  <p class="subtitle">10 cute rabbits · use arrows or ← →</p>

  <div class="stage" role="region" aria-label="Rabbit slideshow">
    <div class="slides" id="slides"></div>
    <div class="gradient-overlay"></div>
    <div class="counter" id="counter">1 / 10</div>
    <button class="nav prev" id="prev" aria-label="Previous">‹</button>
    <button class="nav next" id="next" aria-label="Next">›</button>
  </div>

  <div class="dots" id="dots"></div>
  <p class="hint">click <kbd>‹</kbd> <kbd>›</kbd> or press <kbd>←</kbd> <kbd>→</kbd></p>

<script>
  const PHOTOS = [
    '1585110396000-c9ffd4e4b308',
    '1609151354448-c4a53450c6e9',
    '1535241749838-299277b6305f',
    '1480554840075-72cbdabbf689',
    '1452857297128-d9c29adba80b',
    '1589952283406-b53a7d1347e8',
    '1581872454565-822dac9367aa',
    '1623686070581-5d2eb8187fc2',
    '1591561582301-7ce6588cc286',
    '1559214369-a6b1d7919865',
  ];

  const slidesEl = document.getElementById('slides');
  const dotsEl = document.getElementById('dots');
  const counterEl = document.getElementById('counter');
  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');

  let current = 0;

  PHOTOS.forEach((id, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide loading';
    const url = `https://images.unsplash.com/photo-${id}?w=1200&q=80&auto=format&fit=crop`;
    const img = new Image();
    img.onload = () => {
      slide.style.backgroundImage = `url('${url}')`;
      slide.classList.remove('loading');
    };
    img.onerror = () => slide.classList.remove('loading');
    img.src = url;
    slidesEl.appendChild(slide);

    const dot = document.createElement('button');
    dot.className = 'dot';
    dot.setAttribute('aria-label', `Go to slide ${i + 1}`);
    dot.addEventListener('click', () => go(i));
    dotsEl.appendChild(dot);
  });

  function render() {
    [...slidesEl.children].forEach((s, i) => s.classList.toggle('active', i === current));
    [...dotsEl.children].forEach((d, i) => d.classList.toggle('active', i === current));
    counterEl.textContent = `${current + 1} / ${PHOTOS.length}`;
  }

  function go(i) {
    current = (i + PHOTOS.length) % PHOTOS.length;
    render();
  }

  prevBtn.addEventListener('click', () => go(current - 1));
  nextBtn.addEventListener('click', () => go(current + 1));

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') go(current - 1);
    if (e.key === 'ArrowRight') go(current + 1);
  });

  // Touch swipe
  let touchStart = null;
  const stage = document.querySelector('.stage');
  stage.addEventListener('touchstart', (e) => { touchStart = e.touches[0].clientX; });
  stage.addEventListener('touchend', (e) => {
    if (touchStart === null) return;
    const dx = e.changedTouches[0].clientX - touchStart;
    if (Math.abs(dx) > 40) go(current + (dx < 0 ? 1 : -1));
    touchStart = null;
  });

  render();
</script>
</body>
</html>
